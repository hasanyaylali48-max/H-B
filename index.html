<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>H&B</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Hoşgeldiniz ekranı -->
  <div id="welcome" class="screen">
    <div class="overlay">
      <canvas id="particles"></canvas>
      <img src="1775402448038.png" alt="H&B Logo" class="logo animate-reveal">
      <h1 id="greeting" class="animate-fade">Hoşgeldiniz 🚀</h1>
      <p id="quote" class="typing"></p>
      <p id="datetime" class="digital-clock"></p>
      <p id="weather"></p>
      <div id="progress-container">
        <div id="progress-bar"></div>
      </div>
      <button onclick="goToPanels()" class="glow-button">Devam Et</button>
    </div>
  </div>

  <!-- Paneller ekranı -->
  <div id="panels" class="screen hidden">
    <h2>H&B Panelleri</h2>
    <div class="panel">🕒 Mola Takibi</div>
    <div class="panel">⚽ Canlı Maç Skorları</div>
    <div class="panel">📰 Marmaris/Dünya Haberleri</div>
    <div class="panel">💬 Mini Sosyal Medya</div>
    <div class="panel">✈️🚢📹 Marmaris Bilgileri</div>
    <div class="panel">👥 Begüm & Hasan Shift</div>
    <div class="panel">🤖 Yapay Zeka Asistanı</div>
  </div>

  <script src="app.js"></script>
</body>
</html>
